<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Ooredoo Fintech · Group Stage Closed</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07111f;color:#f7fbff;min-height:100vh}
.pg{display:none}.pg.active{display:block}
.hdr{background:linear-gradient(90deg,#b30010,#E30613,#ff1a2e);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(227,6,19,.4)}
.hdr-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:.03em}
.hdr-badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;color:#fff}
.prog-wrap{max-width:860px;margin:0 auto;padding:14px 16px 0}
.prog-label{font-size:12px;color:#b8c4d1;font-weight:600;margin-bottom:6px;letter-spacing:.04em}
.prog-bg{background:rgba(255,255,255,.08);border-radius:999px;height:5px}
.prog-fill{height:5px;border-radius:999px;background:linear-gradient(90deg,#E30613,#ff6b6b);transition:width .4s}
.prog-dots{display:flex;gap:4px;margin-top:8px}
.dot{height:4px;flex:1;border-radius:999px;background:rgba(255,255,255,.1);min-width:10px}
.dot.done{background:#E30613}.dot.cur{background:#ff8080}
.wrap{max-width:860px;margin:0 auto;padding:16px}
.hero{height:200px;background:linear-gradient(135deg,rgba(227,6,19,.35),rgba(0,0,0,.65)),url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1400&q=80') center/cover;display:flex;align-items:center;padding:0 32px;border-radius:0 0 20px 20px;margin-bottom:16px}
.hero-kicker{display:inline-block;background:#E30613;color:#fff;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.hero h1{font-size:34px;font-weight:900;line-height:1.05;background:linear-gradient(135deg,#fff,#ffd0d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:rgba(255,255,255,.7);font-size:13px;margin-top:6px}
.grp-hero{background:linear-gradient(135deg,rgba(227,6,19,.25),rgba(0,0,0,.5)),url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1400&q=80') center/cover;padding:24px 28px;border-radius:0 0 20px 20px;margin-bottom:16px}
.kicker{display:inline-block;background:#E30613;color:#fff;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.grp-hero h2{font-size:26px;font-weight:900;color:#fff}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:22px}
.card-title{font-size:18px;font-weight:800;margin-bottom:4px}
.card-sub{font-size:13px;color:#b8c4d1;margin-bottom:20px}
.inp-wrap{position:relative;margin-bottom:6px}
.inp-wrap input{width:100%;padding:15px 50px 15px 18px;border-radius:14px;border:1.5px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#f7fbff;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:.2s}
.inp-wrap input::placeholder{color:#6b7f94}
.inp-wrap input:focus{border-color:#E30613;box-shadow:0 0 0 4px rgba(227,6,19,.15)}
.inp-wrap input.ok{border-color:#00a651;box-shadow:0 0 0 4px rgba(0,166,81,.12)}
.inp-wrap input.bad{border-color:#ff4d4d;box-shadow:0 0 0 4px rgba(255,77,77,.15)}
.inp-ico{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px}
.hint{font-size:12px;color:#6b7f94;margin-top:6px}
.err{color:#ff6b6b;font-size:12px;margin-top:6px;display:none;font-weight:600}
.rules{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:14px}
.rule{background:rgba(227,6,19,.07);border:1px solid rgba(227,6,19,.18);border-radius:14px;padding:14px}
.rule-ico{font-size:20px;margin-bottom:5px}
.rule h4{font-size:13px;font-weight:700;margin-bottom:3px}
.rule p{font-size:12px;color:#b8c4d1}
.flag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}
.flag-opt{cursor:pointer;border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 12px 14px;text-align:center;background:rgba(255,255,255,.03);position:relative;transition:.15s;user-select:none}
.flag-opt:hover{border-color:rgba(227,6,19,.5);background:rgba(227,6,19,.07);transform:translateY(-2px)}
.flag-opt.sel{border-color:#E30613;background:rgba(227,6,19,.13);box-shadow:0 0 0 3px rgba(227,6,19,.15)}
.flag-opt input{position:absolute;opacity:0;width:0;height:0}
.flag-opt img{width:80px;height:54px;border-radius:8px;object-fit:cover;display:block;margin:0 auto 10px;box-shadow:0 4px 12px rgba(0,0,0,.35);background:#1a2a3a}
.flag-opt span:last-child{font-weight:700;font-size:13px;display:block}
.chk{display:none;position:absolute;top:8px;right:8px;background:#E30613;color:#fff;border-radius:999px;width:20px;height:20px;font-size:11px;font-weight:800;align-items:center;justify-content:center}
.flag-opt.sel .chk{display:flex}
.warn{display:none;color:#ff6b6b;font-size:13px;margin-top:12px;font-weight:600}
.warn.show{display:block}
.nav{display:flex;gap:12px;margin-top:18px}
.btn{flex:1;padding:15px;border:0;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn.pri{background:linear-gradient(135deg,#E30613,#ff3344);color:#fff;box-shadow:0 4px 18px rgba(227,6,19,.4)}
.btn.sec{background:rgba(255,255,255,.08);color:#f7fbff;border:1px solid rgba(255,255,255,.12)}
.rev-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.rev-item:last-child{border:none}
.rev-grp{font-size:11px;color:#b8c4d1;font-weight:700;width:60px;flex-shrink:0}
.rev-flag{width:36px;height:24px;border-radius:4px;object-fit:cover;background:#1a2a3a}
.rev-team{font-size:14px;font-weight:700;flex:1}
.rev-edit{background:transparent;border:1px solid rgba(255,255,255,.15);color:#b8c4d1;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}
.rev-email{font-size:13px;color:#ff8080;font-weight:700;margin-bottom:14px}
.success{text-align:center;padding:32px 16px}
.trophy{font-size:72px;display:block;margin-bottom:16px}
.success h2{font-size:28px;font-weight:900;margin-bottom:10px}
.success p{color:#b8c4d1;font-size:14px;line-height:1.7}
.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0}
.tag{background:rgba(227,6,19,.12);border:1px solid rgba(227,6,19,.25);color:#ff8080;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600}
@media(max-width:500px){.hero h1{font-size:26px}.flag-grid{grid-template-columns:1fr 1fr}.hdr-title{font-size:13px}}

/* Closed screen overrides */
#page-email{display:none !important;}
#page-success{display:block !important;}
.closed-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 16px;margin:18px 0;color:#fff;text-align:left}
.closed-box p{margin:0;font-size:14px;line-height:1.6;color:#d7dde6}
.closed-box p + p{margin-top:8px}
.closed-title{font-size:15px;font-weight:700;color:#fff;margin:0 0 6px}
</style>
</head>
<body>
<div class="pg active" id="page-success">
  <div class="wrap" style="margin-top:32px"><div class="card"><div class="success">
    <span class="trophy">⏰</span>
    <h2>Thank You for Participating</h2>
    <p>Group stage prediction time is over.</p>
    <div class="closed-box">
      <p class="closed-title">Next round: Round of 32</p>
      <p>Predictions open on <strong>28th June, 10:00 AM</strong></p>
      <p>Results will be announced on <strong>29th June, 11:00 AM</strong></p>
    </div>
    <p>Please wait for the next round of predictions.</p>
    <p style="font-size:11px;color:#6b7f94;margin-top:16px">Ooredoo Fintech · World Cup Mania Prediction League 2026</p>
  </div></div></div>
</div>
</body>
</html>
